name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore MousePoint.sln

      - name: Build
        run: dotnet build MousePoint.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MousePoint.sln --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/MousePoint/MousePoint.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MousePoint
          path: publish/MousePoint.exe
          if-no-files-found: error
